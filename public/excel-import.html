<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 导入执行台</title>
    <style>
      :root {
        --bg: #f4efe7;
        --panel: rgba(255, 252, 247, 0.9);
        --ink: #1f1d1a;
        --muted: #6a6257;
        --line: rgba(31, 29, 26, 0.12);
        --accent: #b54d2d;
        --accent-strong: #8d3318;
        --accent-soft: rgba(181, 77, 45, 0.12);
        --success: #1f7a4d;
        --error: #b42318;
        --shadow: 0 24px 60px rgba(55, 35, 19, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(181, 77, 45, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at right center,
            rgba(210, 165, 92, 0.2),
            transparent 24%
          ),
          linear-gradient(160deg, #f8f1e7 0%, #f2ece2 52%, #ece6dd 100%);
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 32px auto;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .page-title {
        margin: 0;
        font-size: clamp(26px, 4vw, 36px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .panel {
        padding: 20px;
      }

      form {
        display: grid;
        gap: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input[type='file'],
      input[type='text'],
      select,
      textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        color: var(--ink);
      }

      textarea {
        min-height: 280px;
        resize: vertical;
        font-family: 'SFMono-Regular', 'Consolas', monospace;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 20px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      input:disabled,
      select:disabled,
      textarea:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .primary {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-strong) 100%
        );
        color: #fff;
      }

      .secondary {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .status {
        min-height: 24px;
        font-size: 14px;
      }

      .status.success {
        color: var(--success);
      }

      .status.error {
        color: var(--error);
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
      }

      .card small {
        display: block;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .card strong {
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      pre {
        margin: 0;
        max-height: 480px;
        overflow: auto;
        padding: 18px;
        border-radius: 20px;
        background: #171512;
        color: #f6ead8;
        font-size: 12px;
        line-height: 1.6;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 900px) {
        .grid,
        .controls,
        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1 class="page-title">Excel 导入执行台</h1>
        <form id="excel-form">
          <div class="grid">
            <label>
              Excel 文件
              <input
                id="file"
                name="file"
                type="file"
                accept=".xlsx,.xls,.csv"
                required
              />
            </label>
            <label>
              执行参数 JSON
              <textarea id="runflow-json" name="runflow-json" rows="12">
{
  "flowKey": "am0xuhyt9p6mfcat",
  "action": "sync_input_supplier_settlement_finance",
  "debug": true
}</textarea
              >
            </label>
          </div>

          <div class="controls">
            <label>
              导入场景
              <select id="scene" name="scene">
                <option value="supplier-settlement" selected>
                  供应商结算导入
                </option>
              </select>
            </label>
            <label>
              执行模式
              <select id="mode" name="mode">
                <option value="chunked" selected>分批执行</option>
                <option value="full">一次执行</option>
              </select>
            </label>
          </div>

          <div class="controls">
            <label>
              每批条数
              <select id="batch-size" name="batch-size">
                <option value="20" selected>20</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </label>
            <label>
              工作表名称
              <input
                id="sheet-name"
                name="sheet-name"
                type="text"
                placeholder="留空默认第一张"
              />
            </label>
          </div>

          <div class="controls">
            <label>
              失败后继续
              <select id="continue-on-error" name="continue-on-error">
                <option value="false" selected>否</option>
                <option value="true">是</option>
              </select>
            </label>
            <label>
              测试条数
              <select id="test-count" name="test-count">
                <option value="1" selected>1 条</option>
                <option value="3">3 条</option>
                <option value="5">5 条</option>
                <option value="10">10 条</option>
              </select>
            </label>
          </div>

          <div class="controls">
            <label>
              说明
              <input
                type="text"
                value="预览走导入接口，执行直接按批调用 runFlow"
                disabled
              />
            </label>
            <label>
              当前状态
              <input id="run-state" type="text" value="空闲" disabled />
            </label>
          </div>

          <div class="actions">
            <button class="secondary" type="button" id="preview-btn">
              解析预览
            </button>
            <button class="secondary" type="button" id="test-btn">
              先测几条
            </button>
            <button class="primary" type="button" id="run-btn">开始执行</button>
            <button class="secondary" type="button" id="pause-btn" disabled>
              暂停
            </button>
          </div>

          <div id="status" class="status"></div>
        </form>
      </section>

      <section id="summary-panel" class="panel hidden">
        <div class="summary">
          <div class="card">
            <small>订单数</small>
            <strong id="orderTotal">-</strong>
          </div>
          <div class="card">
            <small>结算单数</small>
            <strong id="settlementTotal">-</strong>
          </div>
          <div class="card">
            <small>有效明细行数</small>
            <strong id="detailRowTotal">-</strong>
          </div>
          <div class="card">
            <small>工作表</small>
            <strong id="worksheetName">-</strong>
          </div>
        </div>
      </section>

      <section id="result-panel" class="panel hidden">
        <pre id="result"></pre>
      </section>

      <section id="log-panel" class="panel">
        <pre id="log-output">等待开始...</pre>
      </section>
    </main>

    <script>
      const form = document.getElementById('excel-form');
      const fileInput = document.getElementById('file');
      const runflowJsonInput = document.getElementById('runflow-json');
      const sceneInput = document.getElementById('scene');
      const modeInput = document.getElementById('mode');
      const batchSizeInput = document.getElementById('batch-size');
      const sheetNameInput = document.getElementById('sheet-name');
      const continueOnErrorInput = document.getElementById('continue-on-error');
      const testCountInput = document.getElementById('test-count');
      const previewButton = document.getElementById('preview-btn');
      const testButton = document.getElementById('test-btn');
      const runButton = document.getElementById('run-btn');
      const pauseButton = document.getElementById('pause-btn');
      const statusNode = document.getElementById('status');
      const runStateNode = document.getElementById('run-state');
      const resultPanel = document.getElementById('result-panel');
      const summaryPanel = document.getElementById('summary-panel');
      const resultNode = document.getElementById('result');
      const logOutputNode = document.getElementById('log-output');
      let isRunning = false;
      let isPaused = false;
      let resumeResolver = null;
      let parsedRows = [];
      const modeLabelMap = {
        chunked: '分批执行',
        full: '一次执行',
      };

      const setStatus = (message, type = '') => {
        statusNode.textContent = message || '';
        statusNode.className = 'status' + (type ? ' ' + type : '');
      };

      const fillSummary = (summary) => {
        if (!summary) {
          summaryPanel.classList.add('hidden');
          return;
        }

        summaryPanel.classList.remove('hidden');
        document.getElementById('orderTotal').textContent =
          summary.orderTotal ?? '-';
        document.getElementById('settlementTotal').textContent =
          summary.settlementTotal ?? '-';
        document.getElementById('detailRowTotal').textContent =
          summary.detailRowTotal ?? '-';
        document.getElementById('worksheetName').textContent =
          summary.worksheetName ?? '-';
      };

      const showResult = (payload) => {
        resultPanel.classList.remove('hidden');
        resultNode.textContent = JSON.stringify(payload, null, 2);
      };

      const appendLog = (message) => {
        const line = `[${new Date().toLocaleTimeString('zh-CN', {
          hour12: false,
        })}] ${message}`;
        if (logOutputNode.textContent === '等待开始...') {
          logOutputNode.textContent = line;
        } else {
          logOutputNode.textContent += `\n${line}`;
        }
        logOutputNode.scrollTop = logOutputNode.scrollHeight;
      };

      const clearLog = () => {
        logOutputNode.textContent = '等待开始...';
      };

      const buildBaseFormData = () => {
        const file = fileInput.files[0];
        if (!file) {
          throw new Error('请先选择 Excel 文件');
        }

        const formData = new FormData();
        formData.append('file', file);
        formData.append('scene', sceneInput.value);

        const mode = modeInput.value;
        if (mode) {
          formData.append('mode', mode);
        }

        const chunkSize = batchSizeInput.value;
        if (chunkSize) {
          formData.append('chunkSize', chunkSize);
        }

        const sheetName = sheetNameInput.value.trim();
        if (sheetName) {
          formData.append('sheetName', sheetName);
        }

        return formData;
      };

      const request = async (url, formData) => {
        const response = await fetch(url, {
          method: 'POST',
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.message || '请求失败');
        }
        return payload;
      };

      const requestJson = async (url, payload) => {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || '请求失败');
        }
        return result;
      };

      const buildPreviewFormData = () => buildBaseFormData();

      const buildRunFlowPayloadText = () => {
        const raw = runflowJsonInput.value.trim();
        if (!raw) {
          throw new Error('执行参数 JSON 不能为空');
        }

        try {
          const payload = JSON.parse(raw);
          if (
            !payload ||
            Array.isArray(payload) ||
            typeof payload !== 'object'
          ) {
            throw new Error('执行参数 JSON 必须是对象');
          }
        } catch (error) {
          if (
            error instanceof Error &&
            error.message === '执行参数 JSON 必须是对象'
          ) {
            throw error;
          }
          throw new Error('执行参数 JSON 格式不正确');
        }

        return raw;
      };

      const buildRunFlowPayload = () => {
        let payload;
        try {
          payload = JSON.parse(buildRunFlowPayloadText());
        } catch (error) {
          throw error;
        }

        if (
          String(payload.action || '').trim() !==
          'sync_input_supplier_settlement_finance'
        ) {
          throw new Error(
            '当前页面用于结算导入，action 必须是 sync_input_supplier_settlement_finance',
          );
        }

        return payload;
      };

      const getBatchSize = () => {
        const batchSize = Number(batchSizeInput.value);
        if (!Number.isInteger(batchSize) || batchSize <= 0) {
          throw new Error('每批条数必须是正整数');
        }
        return batchSize;
      };

      const getTestCount = () => {
        const testCount = Number(testCountInput.value);
        if (!Number.isInteger(testCount) || testCount <= 0) {
          throw new Error('测试条数必须是正整数');
        }
        return testCount;
      };

      const updateRunState = (message) => {
        runStateNode.value = message;
      };

      const updatePauseButton = () => {
        pauseButton.disabled = !isRunning;
        pauseButton.textContent = isPaused ? '继续' : '暂停';
      };

      const waitIfPaused = async () => {
        if (!isPaused) {
          return;
        }

        await new Promise((resolve) => {
          resumeResolver = resolve;
        });
      };

      const runBatch = async ({
        basePayload,
        rows,
        batchNo,
        totalBatches,
        start,
        end,
      }) => {
        appendLog(
          `第 ${batchNo}/${totalBatches} 批开始，范围 ${start}-${end}，共 ${rows.length} 条`,
        );
        const startedAt = Date.now();
        const result = await requestJson('/api/runFlow', {
          ...basePayload,
          rows,
          _clientMeta: {
            pageNo: batchNo,
            totalPages: totalBatches,
            start,
            end,
          },
        });
        const durationMs = Date.now() - startedAt;
        showResult(result);
        appendLog(`第 ${batchNo}/${totalBatches} 批完成，耗时 ${durationMs}ms`);
        return result;
      };

      const ensurePreviewRows = async () => {
        if (parsedRows.length > 0) {
          return;
        }

        appendLog('未发现预览数据，自动先解析一次');
        const payload = await request(
          '/api/import/preview',
          buildPreviewFormData(),
        );
        parsedRows = Array.isArray(payload.rows) ? payload.rows : [];
        fillSummary(payload.summary);
        showResult(payload);
      };

      const runRows = async (rows, label) => {
        const basePayload = buildRunFlowPayload();
        const mode = modeInput.value;

        if (!rows.length) {
          throw new Error('没有可执行的数据，请先解析预览');
        }

        clearLog();
        appendLog(`${label}开始，共 ${rows.length} 条`);

        if (mode === 'full') {
          updateRunState('执行中');
          await runBatch({
            basePayload,
            rows,
            batchNo: 1,
            totalBatches: 1,
            start: 1,
            end: rows.length,
          });
          appendLog(`${label}完成，共 1 批`);
          return;
        }

        const batchSize = getBatchSize();
        const totalBatches = Math.ceil(rows.length / batchSize);
        const continueOnError = continueOnErrorInput.value === 'true';

        for (let batchNo = 1; batchNo <= totalBatches; batchNo += 1) {
          await waitIfPaused();
          updateRunState(isPaused ? '已暂停' : '执行中');
          const start = (batchNo - 1) * batchSize + 1;
          const end = Math.min(batchNo * batchSize, rows.length);
          const batchRows = rows.slice(start - 1, end);

          try {
            await runBatch({
              basePayload,
              rows: batchRows,
              batchNo,
              totalBatches,
              start,
              end,
            });
          } catch (error) {
            appendLog(
              `第 ${batchNo}/${totalBatches} 批失败：${error.message || '未知错误'}`,
            );
            if (!continueOnError) {
              throw error;
            }
          }
        }

        appendLog(`${label}完成，共 ${totalBatches} 批`);
      };

      const withLoading = async (handler) => {
        isRunning = true;
        isPaused = false;
        resumeResolver = null;
        previewButton.disabled = true;
        testButton.disabled = true;
        runButton.disabled = true;
        sceneInput.disabled = true;
        modeInput.disabled = true;
        batchSizeInput.disabled = true;
        sheetNameInput.disabled = true;
        continueOnErrorInput.disabled = true;
        testCountInput.disabled = true;
        runflowJsonInput.disabled = true;
        fileInput.disabled = true;
        updatePauseButton();
        updateRunState('处理中');
        setStatus('处理中...', '');

        try {
          await handler();
        } catch (error) {
          setStatus(error.message || '处理失败', 'error');
        } finally {
          isRunning = false;
          isPaused = false;
          resumeResolver = null;
          previewButton.disabled = false;
          testButton.disabled = false;
          runButton.disabled = false;
          sceneInput.disabled = false;
          modeInput.disabled = false;
          batchSizeInput.disabled = false;
          sheetNameInput.disabled = false;
          continueOnErrorInput.disabled = false;
          testCountInput.disabled = false;
          runflowJsonInput.disabled = false;
          fileInput.disabled = false;
          updatePauseButton();
          updateRunState('空闲');
        }
      };

      previewButton.addEventListener('click', () =>
        withLoading(async () => {
          getBatchSize();
          appendLog('开始解析 Excel');
          const payload = await request(
            '/api/import/preview',
            buildPreviewFormData(),
          );
          parsedRows = Array.isArray(payload.rows) ? payload.rows : [];
          fillSummary(payload.summary);
          showResult(payload);
          appendLog(
            `解析完成，模式 ${modeLabelMap[payload.summary?.mode] ?? '-'}，可执行条数 ${payload.summary?.totalItems ?? 0}，总批次 ${payload.summary?.totalBatches ?? 0}`,
          );
          setStatus('解析完成，可以开始执行。', 'success');
        }),
      );

      testButton.addEventListener('click', () =>
        withLoading(async () => {
          await ensurePreviewRows();
          const testCount = getTestCount();
          const rows = parsedRows.slice(0, testCount);
          await runRows(rows, `测试前 ${rows.length} 条`);
          setStatus(`测试完成，共执行 ${rows.length} 条。`, 'success');
        }),
      );

      runButton.addEventListener('click', () =>
        withLoading(async () => {
          await ensurePreviewRows();
          await runRows(parsedRows, '正式执行');
          setStatus('执行完成。', 'success');
        }),
      );

      pauseButton.addEventListener('click', () => {
        if (!isRunning) {
          return;
        }

        if (isPaused) {
          isPaused = false;
          updatePauseButton();
          updateRunState('执行中');
          appendLog('继续执行');
          const resolve = resumeResolver;
          resumeResolver = null;
          if (resolve) {
            resolve();
          }
          return;
        }

        isPaused = true;
        updatePauseButton();
        updateRunState('已暂停');
        appendLog('已暂停，等待继续');
      });

      form.addEventListener('submit', (event) => event.preventDefault());
    </script>
  </body>
</html>
